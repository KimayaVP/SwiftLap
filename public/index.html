<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftLapLogic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: white;
    }
    .container { max-width: 400px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .header p { color: #94a3b8; font-size: 0.9rem; }
    
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #94a3b8;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active { background: #0ea5e9; color: white; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.85rem; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1rem;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; margin-top: 10px; }
    
    .error { color: #ef4444; font-size: 0.85rem; margin-bottom: 10px; }
    .success { color: #22c55e; font-size: 0.85rem; margin-bottom: 10px; }
    
    .dashboard { display: none; }
    .auth-section { display: block; }
    
    .user-info {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .user-info h3 { color: #22c55e; margin-bottom: 8px; }
    
    .swimmer-card {
      background: rgba(255,255,255,0.03);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    
    .footer { text-align: center; margin-top: 40px; color: #64748b; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏊 SwiftLapLogic</h1>
      <p>Track. Analyze. Improve.</p>
    </div>

    <!-- Auth Section -->
    <div id="authSection" class="auth-section">
      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="showTab('login')">Login</button>
          <button class="tab" onclick="showTab('signup')">Sign Up</button>
        </div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <!-- Login Form -->
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        
        <!-- Signup Form -->
        <form id="signupForm" style="display:none;">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="signupName" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" required minlength="6">
          </div>
          <div class="form-group">
            <label>I am a...</label>
            <select id="signupRole">
              <option value="swimmer">Swimmer</option>
              <option value="coach">Coach</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard" class="dashboard">
      <div class="user-info">
        <h3>Welcome, <span id="userName"></span>!</h3>
        <p>Role: <span id="userRole"></span></p>
      </div>
      
      <!-- Coach Section -->
      <div id="coachSection" style="display:none;">
        <div class="card">
          <h2>👥 Add Swimmer</h2>
          <form id="addSwimmerForm">
            <div class="form-group">
              <label>Swimmer Name</label>
              <input type="text" id="swimmerName" required>
            </div>
            <div class="form-group">
              <label>Swimmer Email</label>
              <input type="email" id="swimmerEmail" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="swimmerPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Add Swimmer</button>
          </form>
        </div>
        
        <div class="card">
          <h2>🏊 My Swimmers</h2>
          <div id="swimmersList"></div>
        </div>
      </div>
      
      <!-- Swimmer Section -->
      <div id="swimmerSection" style="display:none;">
        <div class="card">
          <h2>🏊 Swimmer Dashboard</h2>
          <p style="color: #94a3b8;">Your training data will appear here.</p>
        </div>
      </div>
      
      <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div class="footer">Built by Kimaya 🏊‍♀️</div>
  </div>

  <script>
    let currentUser = null;
    let accessToken = null;

    // Tab switching
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      clearMessages();
    }

    function clearMessages() {
      document.getElementById('error').textContent = '';
      document.getElementById('success').textContent = '';
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    function showSuccess(msg) {
      document.getElementById('success').textContent = msg;
    }

    // Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('signupName').value,
          email: document.getElementById('signupEmail').value,
          password: document.getElementById('signupPassword').value,
          role: document.getElementById('signupRole').value
        })
      });
      
      const data = await res.json();
      if (data.error) {
        showError(data.error);
      } else {
        showSuccess('Account created! Please login.');
        showTab('login');
        document.querySelector('.tab').click();
      }
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      
      const data = await res.json();
      if (data.error) {
        showError(data.error);
      } else {
        currentUser = data.user;
        accessToken = data.session.access_token;
        localStorage.setItem('token', accessToken);
        localStorage.setItem('user', JSON.stringify(currentUser));
        showDashboard();
      }
    });

    // Show dashboard
    function showDashboard() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('userName').textContent = currentUser.name;
      document.getElementById('userRole').textContent = currentUser.role;
      
      if (currentUser.role === 'coach') {
        document.getElementById('coachSection').style.display = 'block';
        loadSwimmers();
      } else {
        document.getElementById('swimmerSection').style.display = 'block';
      }
    }

    // Add swimmer (coach only)
    document.getElementById('addSwimmerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const res = await fetch('/api/coach/add-swimmer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('swimmerName').value,
          email: document.getElementById('swimmerEmail').value,
          password: document.getElementById('swimmerPassword').value,
          coachId: currentUser.id
        })
      });
      
      const data = await res.json();
      if (data.error) {
        alert(data.error);
      } else {
        document.getElementById('addSwimmerForm').reset();
        loadSwimmers();
      }
    });

    // Load swimmers
    async function loadSwimmers() {
      const res = await fetch(`/api/coach/swimmers/${currentUser.id}`);
      const data = await res.json();
      
      const list = document.getElementById('swimmersList');
      if (data.swimmers.length === 0) {
        list.innerHTML = '<p style="color: #64748b;">No swimmers added yet</p>';
      } else {
        list.innerHTML = data.swimmers.map(s => `
          <div class="swimmer-card">
            <span>${s.name}</span>
            <span style="color: #94a3b8;">${s.email}</span>
          </div>
        `).join('');
      }
    }

    // Logout
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      currentUser = null;
      accessToken = null;
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }

    // Check existing session
    const savedToken = localStorage.getItem('token');
    const savedUser = localStorage.getItem('user');
    if (savedToken && savedUser) {
      accessToken = savedToken;
      currentUser = JSON.parse(savedUser);
      showDashboard();
    }
  </script>
</body>
</html>
