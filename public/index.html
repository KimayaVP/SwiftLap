<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftLapLogic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: white;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .menu-btn {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      border: none;
      padding: 20px;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(14, 165, 233, 0.3);
    }
    .menu-btn .icon { font-size: 1.5rem; }
    .footer {
      text-align: center;
      margin-top: 60px;
      color: #64748b;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏊 SwiftLapLogic</h1>
      <p>Track. Analyze. Improve.</p>
    </div>
    <div class="menu">
      <button class="menu-btn" onclick="alert('Coming next!')">
        <span class="icon">⏱️</span> Log Swim Time
      </button>
      <button class="menu-btn" onclick="alert('Coming next!')">
        <span class="icon">📊</span> View Progress
      </button>
      <button class="menu-btn" onclick="alert('Coming next!')">
        <span class="icon">🎯</span> Set Goals
      </button>
      <button class="menu-btn" onclick="alert('Coming next!')">
        <span class="icon">🎥</span> Upload Video
      </button>
    </div>
    <div class="footer">
      Built by Kimaya 🏊‍♀️
    </div>
  </div>
</body>
</html>
